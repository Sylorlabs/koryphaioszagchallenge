name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-and-test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for exposed secrets
        run: |
          echo "🔍 Scanning for exposed API keys in committed files..."
          # Patterns: sk- keys, key- tokens, Bearer tokens, generic api keys
          VIOLATIONS=$(grep -rn --include='*.json' --include='*.ts' --include='*.js' --include='*.yml' --include='*.yaml' \
            -E '(sk-[a-zA-Z0-9]{20,}|key-[a-zA-Z0-9]{20,}|Bearer [a-zA-Z0-9_-]{20,}|"apiKey"\s*:\s*"[a-zA-Z0-9_-]{20,}")' \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=target --exclude='.env.example' . || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ EXPOSED SECRETS DETECTED:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ No exposed secrets found."

      - name: Type check
        run: bun run typecheck:ci

      - name: Lint (format check)
        run: bun run format:changed "$FORMAT_BASE"
        env:
          FORMAT_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}

      - name: Run tests
        run: bun run test:core

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: bun run test:e2e

      - name: Build
        run: bun run build:ci

  legacy-mcp-tests:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run legacy MCP regression suite
        run: bun run --filter mcp-server test
